command:
  - sh
  - -c
  - uvicorn api.main:app --host 0.0.0.0 --port ${DATABRICKS_APP_PORT:-8080}

env:
  - name: PYTHONPATH
    value: src
  - name: ENVIRONMENT
    value: databricks
  - name: DATABRICKS_HOST
    value: "https://aip-amn-dev.cloud.databricks.com"
  - name: DATABRICKS_TOKEN
    valueFrom: databricks-token          # secret resource -> defpredict/databricks-token
  - name: DATABRICKS_WAREHOUSE_ID
    value: "074f118f33700427"
  - name: DATABRICKS_CATALOG
    value: defpredict
  - name: DATABRICKS_SCHEMA
    value: main
  - name: SUGGESTOR_MODEL
    value: defpredict-suggestor
  - name: EVALUATOR_MODEL
    value: defpredict-evaluator
  - name: FRONTEND_URL
    value: "https://defpredict-1288108293221728.aws.databricksapps.com"
